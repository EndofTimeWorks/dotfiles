format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$cmd_duration\
$fill\
$status\
$time\
$line_break\
$character"""

palette = "mariana"

[palettes.mariana]
purple = "#c792ea"
cyan = "#4ec9b0"
green = "#99c794"
yellow = "#fac863"
pink = "#ec5f89"
red = "#f97b58"
text = "#d8dee9"
subtext = "#8892a4"
bg = "#16161e"

[username]
style_user = "bold purple"
style_root = "bold red"
format = "[$user]($style)"
show_always = true

[hostname]
style = "bold cyan"
format = "[@$hostname]($style) "
ssh_only = false

[directory]
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 5
truncate_to_repo = false
home_symbol = "~"
read_only = " 󰌾"
read_only_style = "red"

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "([$all_status$ahead_behind]($style) )"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✘${count}"
stashed = "\\$${count}"

[python]
symbol = " "
style = "yellow"
format = "[$symbol$version]($style) "
detect_extensions = ["py"]
detect_files = [".python-version", "Pipfile", "requirements.txt", "setup.py", "pyproject.toml"]

[nodejs]
symbol = " "
style = "green"
format = "[$symbol$version]($style) "
detect_extensions = ["js", "ts", "mjs", "cjs", "mts", "cts"]
detect_files = ["package.json", ".nvmrc"]

[rust]
symbol = " "
style = "red"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style = "cyan"
format = "[$symbol$version]($style) "

[java]
symbol = " "
style = "red"
format = "[$symbol$version]($style) "

[cmd_duration]
min_time = 2000
style = "yellow"
format = "[󱦟 $duration]($style) "

[fill]
symbol = " "

[status]
disabled = false
style = "bold pink"
format = "[✗ $status]($style) "
success_symbol = ""

[time]
disabled = false
style = "bold subtext"
format = "[$time]($style)"
time_format = "%H:%M"

[character]
success_symbol = "[❯](bold purple)"
error_symbol = "[❯](bold pink)"
vimcmd_symbol = "[❮](bold green)"

[line_break]
disabled = false
