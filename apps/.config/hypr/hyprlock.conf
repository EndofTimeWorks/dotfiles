$font_ui = Noto Sans
$font_mono = Maple Mono NF

general {
    hide_cursor = true
    ignore_empty_input = true
    text_trim = true
}

auth {
    fingerprint {
        enabled = true
        ready_message = Scan fingerprint to unlock
        present_message = Scanning fingerprint...
        retry_delay = 250
    }
}

animations {
    enabled = true
    bezier = ease, 0.22, 1, 0.36, 1
    animation = fadeIn, 1, 4, ease
    animation = fadeOut, 1, 4, ease
    animation = inputFieldDots, 1, 2, ease
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    noise = 0.011
    contrast = 0.92
    brightness = 0.78
    vibrancy = 0.18
    vibrancy_darkness = 0.22
}

label {
    monitor =
    text = $TIME
    color = rgba(234, 239, 255, 0.96)
    font_size = 92
    font_family = $font_mono
    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A  •  %B %-d"
    color = rgba(164, 174, 198, 0.94)
    font_size = 18
    font_family = $font_ui
    position = 0, 14
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT[us,intl]
    color = rgba(199, 146, 234, 0.88)
    font_size = 14
    font_family = $font_mono
    position = 0, -82
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.24
    dots_center = true
    fade_on_empty = true
    hide_input = false
    inner_color = rgba(15, 17, 32, 0.82)
    outer_color = rgba(199, 146, 234, 0.28)
    check_color = rgba(95, 179, 179, 0.82)
    fail_color = rgba(236, 95, 137, 0.86)
    capslock_color = rgba(250, 200, 99, 0.72)
    font_color = rgba(235, 241, 255, 0.98)
    font_family = $font_ui
    placeholder_text = <span foreground="#8b93ad">unlock or scan fingerprint</span>
    check_text = <span foreground="#8be9d0">authenticating...</span>
    fail_text = <span foreground="#ff8c8c">$PAMFAIL</span>
    rounding = 14
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.35)
    position = 0, -150
    halign = center
    valign = center
}

label {
    monitor =
    text = esc to clear • ctrl+u to reset
    color = rgba(127, 132, 156, 0.9)
    font_size = 12
    font_family = $font_ui
    position = 0, -206
    halign = center
    valign = center
}
